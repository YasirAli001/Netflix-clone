<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Netflix</title>
</head>
<body>
    <header>
        <img src="netflix-3.svg" alt="Logo" width="20%">
        
    </header>
    <div class="Container">
   
    <div class="text">
        <h2>Enter your info to sign in</h2>
        <h3>Or get Started with a new account</h3>
        </div>
        <div class="form">
            <form action="Post" method="get">
                <label for="Email or mobile number"></label>
                <input type="email" name="email" id="email" placeholder="Email or mobile number">
                <br><br>
                <label for="Passward"></label>
                <input type="password" name="Password" id="Password" placeholder="Password">
            </form>
            <br><br> 
            <div class="card">
                <Button>Continue</Button>
            </div>

        </div>

    </div>
</body>
</html>
